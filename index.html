<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pareceres de Inspeção – Meta</title>
<link rel="icon" type="image/png" href="Meta-Logo-PNG-HD.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f7f8fa;
    --border: #e0e4ea;
    --text: #1a1a2e;
    --text-dim: #6b7280;
    --accent: #1a33cc;
    --accent-hover: #1428aa;
    --accent-light: #eef1fc;
    --green: #16a34a;
    --header-bg: #ffffff;
    --shadow: 0 1px 4px rgba(0,0,0,.07);
    --group-header-bg: #eef1fc;
    --group-header-text: #1a33cc;
  }

  [data-theme="dark"] {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3347;
    --text: #e8eaf6;
    --text-dim: #8b92b3;
    --accent: #4d6bff;
    --accent-hover: #3a56f0;
    --accent-light: #1e2540;
    --green: #22c55e;
    --header-bg: #13151f;
    --shadow: 0 1px 6px rgba(0,0,0,.3);
    --group-header-bg: #1e2540;
    --group-header-text: #7c9bff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background .3s, color .3s;
  }

  header {
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
    box-shadow: var(--shadow);
    transition: background .3s, border-color .3s;
  }

  header img { height: 36px; object-fit: contain; }

  .header-right { display: flex; align-items: center; gap: 16px; }
  .header-title-wrap { text-align: right; }
  .header-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .header-sub { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

  .theme-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all .2s;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
  }

  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

  main { max-width: 900px; margin: 32px auto; padding: 0 20px; }

  .page-title { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .page-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; }

  .search-wrap { position: relative; margin-bottom: 16px; }

  .search-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim); pointer-events: none;
  }

  #search {
    width: 100%;
    padding: 13px 42px 13px 44px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .3s;
  }

  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(26,51,204,.1);
  }

  #search::placeholder { color: var(--text-dim); }

  #clear-btn {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 16px; display: none; padding: 0; line-height: 1;
  }

  #clear-btn:hover { color: var(--accent); }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

  .filter-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .results-info { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
  .results-info strong { color: var(--text); }

  .group {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: background .3s, border-color .3s;
  }

  .group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--group-header-bg);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: background .15s;
  }

  .group-header:hover { filter: brightness(.97); }

  .group-left { display: flex; align-items: center; gap: 10px; }

  .group-icon {
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .group-name { font-size: 14px; font-weight: 700; color: var(--group-header-text); }
  .group-right { display: flex; align-items: center; gap: 10px; }

  .group-count {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
  }

  .group-arrow { color: var(--text-dim); font-size: 11px; transition: transform .2s; }
  .group.collapsed .group-arrow { transform: rotate(-90deg); }
  .group.collapsed .group-body { display: none; }

  .item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
    gap: 16px;
  }

  .item:last-child { border-bottom: none; }
  .item:hover { background: var(--surface2); }

  .item-info { flex: 1; min-width: 0; }

  .item-key { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .item-sit { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background .15s, transform .1s;
  }

  .copy-btn:hover { background: var(--accent-hover); }
  .copy-btn:active { transform: scale(.96); }
  .copy-btn.copied { background: var(--green); }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }

  mark { background: #fff3b0; border-radius: 3px; padding: 0 2px; color: #1a1a2e; }
  [data-theme="dark"] mark { background: #4a3f00; color: #ffe066; }
</style>
</head>
<body>

<header>
  <img src="Meta-Logo-PNG-HD2.png" alt="Meta Logo">
  <div class="header-right">
    <div class="header-title-wrap">
      <div class="header-title">Pareceres de Inspeção</div>
      <div class="header-sub">Sistema interno de consulta</div>
    </div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">
      <span id="theme-icon">🌙</span>
      <span id="theme-label">Escuro</span>
    </button>
  </div>
</header>

<main>
  <div class="page-title">Pesquisa de Pareceres</div>
  <div class="page-sub">Busque pelo tipo de erro e copie a chave do parecer com um clique.</div>

  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Pesquisar por chave, segmento ou situação..." autocomplete="off">
    <button id="clear-btn" title="Limpar">✕</button>
  </div>

  <div class="filters" id="filters"></div>
  <div class="results-info" id="results-info"></div>
  <div id="list"></div>
</main>

<script>
const DATA = [
  { seg: "TODOS", key: "Documento fora do prazo", sit: "" },
  { seg: "TODOS", key: "Documento inválido", sit: "" },
  { seg: "TODOS", key: "Documento ilegível", sit: "" },
  { seg: "TODOS", key: "Cancelamento", sit: "" },
  { seg: "TODOS", key: "Procedimento", sit: "" },
  { seg: "TODOS", key: "Assinaturas", sit: "" },
  { seg: "TODOS", key: "Chaves documentais", sit: "" },
  { seg: "TODOS", key: "Documento válido", sit: "" },
  { seg: "TODOS", key: "Falta de documento comprobatório", sit: "" },
  { seg: "TODOS", key: "Parecer inválido", sit: "" },
  { seg: "ENDEREÇO", key: "Emissão endereço", sit: "Endereço fora/dentro do prazo" },
  { seg: "ENDEREÇO", key: "Vínculo", sit: "Sem encontrar vínculo" },
  { seg: "ENDEREÇO", key: "Logradouro", sit: "" },
  { seg: "ENDEREÇO", key: "Bairro", sit: "Não precisa validar bairro" },
  { seg: "ENDEREÇO", key: "Tipo de endereço", sit: "" },
  { seg: "ENDEREÇO", key: "N° do endereço", sit: "" },
  { seg: "BEM NOVO", key: "Bem em garantia", sit: "Situação que solicita ajuste no valor do bem mas o mesmo está em garantia" },
  { seg: "BEM NOVO", key: "Valor do bem", sit: "Valor do bem divergente, errado etc" },
  { seg: "BEM NOVO", key: "Valor de avaliação", sit: "Valor divergente, etc" },
  { seg: "BEM NOVO", key: "Laudo de avaliação", sit: "Documento inválido" },
  { seg: "BEM NOVO", key: "Data de avaliação", sit: "Data divergente" },
  { seg: "BEM NOVO", key: "Dados do bem", sit: "Matrícula, NIRF, INCRA, chassi, descrição, área total, UF, placa" },
  { seg: "BEM NOVO", key: "Percentual de propriedade", sit: "" },
  { seg: "BEM NOVO", key: "Benfeitoria", sit: "" },
  { seg: "BEM NOVO", key: "Bem em aquisição", sit: "" },
  { seg: "BEM NOVO", key: "Exclusão do bem", sit: "Quando a % está zerada" },
  { seg: "BEM NOVO", key: "Consulta detran", sit: "Consulta extraída do site do Detran/Senatran" },
  { seg: "BEM NOVO", key: "CRLV", sit: "Vencido, inválido" },
  { seg: "PRODUTOR", key: "Pequeno produtor", sit: "Situações em que consta o caf ou o cálculo da renda" },
  { seg: "PRODUTOR", key: "Médio produtor", sit: "Valor no enquadramento" },
  { seg: "PRODUTOR", key: "Grande produtor", sit: "Excedeu 20%, valor no enquadramento" },
  { seg: "PRODUTOR", key: "Inscrição do produtor", sit: "N° de inscrição" },
  { seg: "FONTE RENDA", key: "Renda NFE", sit: "Divisão errada da nfe/nfe fora do prazo no calculo" },
  { seg: "FONTE RENDA", key: "Renda IRPF", sit: "Rendas provenientes do IRPF, somadas erradas ou reprovadas erradas" },
  { seg: "FONTE RENDA", key: "Recibo IRPF", sit: "Recibo de entrega do IR" },
  { seg: "FONTE RENDA", key: "Renda extrato", sit: "Divergência proveniente de extrato bancário (ex: média realizada errada)" },
  { seg: "FONTE RENDA", key: "Renda holerite", sit: "Cálculo do holerite" },
  { seg: "FONTE RENDA", key: "Renda aposentadoria", sit: "Valor divergente, documento inválido" },
  { seg: "FONTE RENDA", key: "Renda contrato", sit: "Contrato de trabalho, prestação de serviço" },
  { seg: "FONTE RENDA", key: "Renda pro labore", sit: "Valor divergente, documento inválido" },
  { seg: "FONTE RENDA", key: "Renda Decore", sit: "" },
  { seg: "FONTE RENDA", key: "Renda DEFIS", sit: "" },
  { seg: "FONTE RENDA", key: "Renda agropecuária", sit: "" },
  { seg: "FONTE RENDA", key: "Divisão familiar", sit: "" },
  { seg: "FONTE RENDA", key: "Tipo de renda PF", sit: "" },
  { seg: "FONTE RENDA", key: "Cálculo do simples", sit: "" },
  { seg: "FONTE RENDA", key: "Documento do simples", sit: "" },
  { seg: "FONTE RENDA", key: "Consulta simples", sit: "" },
  { seg: "FONTE RENDA", key: "Recibo simples", sit: "" },
  { seg: "FONTE RENDA", key: "Flag simples", sit: "" },
  { seg: "FONTE RENDA", key: "Declaração de faturamento", sit: "" },
  { seg: "FONTE RENDA", key: "DRE", sit: "" },
  { seg: "FONTE RENDA", key: "Previsão de faturamento", sit: "" },
  { seg: "FONTE RENDA", key: "SIMEI", sit: "" },
  { seg: "FONTE RENDA", key: "Cálculo SIMEI", sit: "" },
  { seg: "FONTE RENDA", key: "Tipo de renda PJ", sit: "" },
  { seg: "PESSOA", key: "Naturalidade", sit: "" },
  { seg: "PESSOA", key: "N° do documento", sit: "" },
  { seg: "PESSOA", key: "Documento de identificação", sit: "" },
  { seg: "PESSOA", key: "Filiação", sit: "" },
  { seg: "PESSOA", key: "Tipo do documento", sit: "" },
  { seg: "PESSOA", key: "Órgão expedidor", sit: "" },
  { seg: "PESSOA", key: "UF do expedidor", sit: "" },
  { seg: "PESSOA", key: "Data de emissão", sit: "" },
  { seg: "PESSOA", key: "Data de nascimento", sit: "" },
  { seg: "PESSOA", key: "Estado civil", sit: "" },
  { seg: "PESSOA", key: "Ficha cadastral", sit: "" },
  { seg: "PESSOA", key: "Capital social", sit: "" },
  { seg: "PESSOA", key: "Inscrição estadual", sit: "" },
  { seg: "PESSOA", key: "Inscrição municipal", sit: "" },
  { seg: "PESSOA", key: "N° registro no órgão", sit: "" },
  { seg: "PESSOA", key: "Data de registro", sit: "" },
  { seg: "PESSOA", key: "N° última alteração", sit: "" },
  { seg: "PESSOA", key: "N° de representação", sit: "" },
  { seg: "RELACIONAMENTO", key: "Tipo de relacionamento", sit: "" },
  { seg: "RELACIONAMENTO", key: "Percentual do capital", sit: "" },
  { seg: "RELACIONAMENTO", key: "Data de início", sit: "" },
  { seg: "RELACIONAMENTO", key: "Data fim", sit: "" },
  { seg: "CERTIDÃO", key: "Tipo de certidão", sit: "" },
  { seg: "CERTIDÃO", key: "Data de emissão", sit: "" },
  { seg: "CERTIDÃO", key: "N° da certidão", sit: "" },
];

const SEGMENT_ORDER = ["TODOS","ENDEREÇO","BEM NOVO","PRODUTOR","FONTE RENDA","PESSOA","RELACIONAMENTO","CERTIDÃO"];
const SEGMENT_ICONS = {
  "TODOS":"T","ENDEREÇO":"EN","BEM NOVO":"BN","PRODUTOR":"PR",
  "FONTE RENDA":"FR","PESSOA":"PS","RELACIONAMENTO":"RE","CERTIDÃO":"CE"
};

let activeFilter = "TODOS_SEGS";
let searchTerm = "";

// Filters
const filtersEl = document.getElementById("filters");
[{label:"Todos os segmentos", val:"TODOS_SEGS"}, ...SEGMENT_ORDER.map(s=>({label:s,val:s}))].forEach(f => {
  const btn = document.createElement("button");
  btn.className = "filter-btn" + (f.val==="TODOS_SEGS"?" active":"");
  btn.textContent = f.label;
  btn.dataset.val = f.val;
  btn.onclick = () => {
    activeFilter = f.val;
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active", b.dataset.val===f.val));
    render();
  };
  filtersEl.appendChild(btn);
});

// Search
const searchEl = document.getElementById("search");
const clearBtn = document.getElementById("clear-btn");
searchEl.addEventListener("input", () => {
  searchTerm = searchEl.value.trim().toLowerCase();
  clearBtn.style.display = searchTerm ? "block" : "none";
  render();
});
clearBtn.addEventListener("click", () => {
  searchEl.value=""; searchTerm="";
  clearBtn.style.display="none";
  render();
});

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function highlight(text, term) {
  if (!term) return esc(text);
  const re = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,"gi");
  return esc(text).replace(re,"<mark>$1</mark>");
}

function render() {
  const listEl = document.getElementById("list");
  const infoEl = document.getElementById("results-info");

  const filtered = DATA.filter(d => {
    const matchSeg = activeFilter==="TODOS_SEGS" || d.seg===activeFilter;
    const matchSearch = !searchTerm ||
      d.key.toLowerCase().includes(searchTerm) ||
      d.seg.toLowerCase().includes(searchTerm) ||
      d.sit.toLowerCase().includes(searchTerm);
    return matchSeg && matchSearch;
  });

  infoEl.innerHTML = `<strong>${filtered.length}</strong> parecer${filtered.length!==1?"es":""} encontrado${filtered.length!==1?"s":""}`;

  if (!filtered.length) {
    listEl.innerHTML = `<div class="empty"><p>Nenhum parecer encontrado para "<strong>${esc(searchEl.value)}</strong>"</p></div>`;
    return;
  }

  const groups = {};
  SEGMENT_ORDER.forEach(s => groups[s]=[]);
  filtered.forEach(d => groups[d.seg].push(d));

  listEl.innerHTML = "";
  SEGMENT_ORDER.forEach(seg => {
    const items = groups[seg];
    if (!items.length) return;
    const g = document.createElement("div");
    g.className = "group";
    g.innerHTML = `
      <div class="group-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <div class="group-left">
          <div class="group-icon">${SEGMENT_ICONS[seg]||seg[0]}</div>
          <span class="group-name">${esc(seg)}</span>
        </div>
        <div class="group-right">
          <span class="group-count">${items.length}</span>
          <span class="group-arrow">▼</span>
        </div>
      </div>
      <div class="group-body">
        ${items.map(d=>`
          <div class="item">
            <div class="item-info">
              <div class="item-key">${highlight(d.key, searchTerm)}</div>
              ${d.sit?`<div class="item-sit">${highlight(d.sit, searchTerm)}</div>`:""}
            </div>
            <button class="copy-btn" data-key="${esc(d.key)}" onclick="copyParecer(this)">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copiar
            </button>
          </div>`).join("")}
      </div>`;
    listEl.appendChild(g);
  });
}

function copyParecer(btn) {
  navigator.clipboard.writeText(btn.dataset.key + ":").then(() => {
    btn.classList.add("copied");
    btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copiado!`;
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copiar`;
    }, 2000);
  });
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute("data-theme")==="dark";
  document.documentElement.setAttribute("data-theme", isDark?"light":"dark");
  document.getElementById("theme-icon").textContent = isDark?"🌙":"☀️";
  document.getElementById("theme-label").textContent = isDark?"Escuro":"Claro";
  localStorage.setItem("theme", isDark?"light":"dark");
}

if (localStorage.getItem("theme")==="dark") {
  document.documentElement.setAttribute("data-theme","dark");
  document.getElementById("theme-icon").textContent="☀️";
  document.getElementById("theme-label").textContent="Claro";
}

render();
</script>
</body>
</html>
